<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create a new Lace Luxe Bridal account password." />
  <title>Reset Password | Lace Luxe Bridal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body class="auth-page auth-simple-page">
  <main class="auth-center-shell">
    <a href="index.html" class="auth-brand" aria-label="Lace Luxe Bridal home">
      <span class="brand-icon"><i class="bi bi-flower1"></i></span>
      <span class="brand-text">Lace <em>Luxe</em> Bridal</span>
    </a>

    <section class="auth-form-wrap auth-form-card" aria-labelledby="resetTitle">
      <h1 class="auth-title" id="resetTitle">Create New <em>Password</em></h1>
      <p class="auth-subtitle">Choose a new password for your Lace Luxe account.</p>

      <form id="resetPasswordForm" novalidate>
        <div class="form-group">
          <label for="resetPassword">New Password</label>
          <div class="password-wrap">
            <input type="password" class="form-control-custom" id="resetPassword" placeholder="New password" autocomplete="new-password" required />
            <button type="button" class="pw-toggle" id="resetPwToggle" aria-label="Show password"><i class="bi bi-eye" id="resetPwIcon"></i></button>
          </div>
        </div>

        <div class="form-group">
          <label for="resetPasswordConfirm">Confirm Password</label>
          <div class="password-wrap">
            <input type="password" class="form-control-custom" id="resetPasswordConfirm" placeholder="Confirm password" autocomplete="new-password" required />
            <button type="button" class="pw-toggle" id="resetConfirmPwToggle" aria-label="Show password"><i class="bi bi-eye" id="resetConfirmPwIcon"></i></button>
          </div>
        </div>

        <button type="submit" class="btn-primary-custom auth-submit" id="resetPasswordBtn">
          Update Password <i class="bi bi-check2-circle"></i>
        </button>
      </form>

      <div class="auth-switch"><a href="login.html">Back to sign in</a></div>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
