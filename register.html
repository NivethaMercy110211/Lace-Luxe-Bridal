<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your Lace Luxe Bridal account." />
  <title>Register | Lace Luxe Bridal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body class="auth-page auth-simple-page">
  <main class="auth-center-shell">
    <a href="index.html" class="auth-brand" aria-label="Lace Luxe Bridal home">
      <span class="brand-icon"><i class="bi bi-flower1"></i></span>
      <span class="brand-text">Lace <em>Luxe</em> Bridal</span>
    </a>

    <section class="auth-form-wrap auth-form-card auth-register-card" aria-labelledby="registerTitle">
      <div class="reg-progress" id="regProgress">
        <div class="reg-step active" id="step1dot"><div class="step-circle">1</div><div class="step-label">Profile</div></div>
        <div class="reg-step" id="step2dot"><div class="step-circle">2</div><div class="step-label">Wedding</div></div>
        <div class="reg-step" id="step3dot"><div class="step-circle">3</div><div class="step-label">Confirm</div></div>
      </div>

      <h1 class="auth-title" id="registerTitle">Create Your <em>Account</em></h1>
      <p class="auth-subtitle">Set up your Lace Luxe account in a few simple steps.</p>

      <form id="registerForm" novalidate>
        <div id="regStep1">
          <div class="auth-field-grid">
            <div class="form-group">
              <label for="regFirstName">First Name</label>
              <input type="text" class="form-control-custom" id="regFirstName" placeholder="First name" autocomplete="given-name" required />
            </div>
            <div class="form-group">
              <label for="regLastName">Last Name</label>
              <input type="text" class="form-control-custom" id="regLastName" placeholder="Last name" autocomplete="family-name" required />
            </div>
          </div>

          <div class="form-group">
            <label for="regEmail">Email Address</label>
            <input type="email" class="form-control-custom" id="regEmail" placeholder="your@email.com" autocomplete="email" required />
          </div>

          <div class="form-group">
            <label for="regPassword">Password</label>
            <div class="password-wrap">
              <input type="password" class="form-control-custom" id="regPassword" placeholder="Create a password" autocomplete="new-password" required />
              <button type="button" class="pw-toggle" id="regPwToggle" aria-label="Show password"><i class="bi bi-eye" id="regPwIcon"></i></button>
            </div>
          </div>

          <button type="button" class="btn-primary-custom auth-submit" onclick="goToStep(2)">Continue <i class="bi bi-arrow-right-short"></i></button>
        </div>

        <div id="regStep2" style="display:none;">
          <div class="form-group">
            <label for="regWeddingDate">Wedding Date</label>
            <input type="date" class="form-control-custom" id="regWeddingDate" />
          </div>

          <div class="form-group">
            <label for="regVenueType">Wedding Venue Type</label>
            <select class="form-control-custom" id="regVenueType">
              <option value="">Select venue type</option>
              <option>Garden / Outdoor</option>
              <option>Church / Cathedral</option>
              <option>Beach / Destination</option>
              <option>Ballroom / Hotel</option>
              <option>Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="regSource">How did you hear about us?</label>
            <select class="form-control-custom" id="regSource">
              <option value="">Select source</option>
              <option>Instagram</option>
              <option>Pinterest</option>
              <option>Google Search</option>
              <option>Friend Referral</option>
              <option>The Knot / WeddingWire</option>
              <option>Other</option>
            </select>
          </div>

          <div class="auth-button-row">
            <button type="button" class="btn-outline-custom" onclick="goToStep(1)"><i class="bi bi-arrow-left-short"></i> Back</button>
            <button type="button" class="btn-primary-custom" onclick="goToStep(3)">Continue <i class="bi bi-arrow-right-short"></i></button>
          </div>
        </div>

        <div id="regStep3" style="display:none;">
          <div class="auth-review-box">
            <div class="auth-review-label">Review Your Details</div>
            <div id="reviewDetails"></div>
          </div>

          <label class="form-check-label auth-check auth-check-block">
            <input type="checkbox" id="agreeTerms" required />
            <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</span>
          </label>

          <label class="form-check-label auth-check auth-check-block">
            <input type="checkbox" id="subscribeNewsletter" checked />
            <span>Subscribe to bridal inspiration and member updates.</span>
          </label>

          <div class="auth-button-row">
            <button type="button" class="btn-outline-custom" onclick="goToStep(2)"><i class="bi bi-arrow-left-short"></i> Back</button>
            <button type="submit" class="btn-primary-custom" id="createAccountBtn">
              <span id="createBtnText">Create Account <i class="bi bi-check2-circle"></i></span>
              <span id="createBtnLoading" class="d-none"><span class="spinner-border spinner-border-sm me-2"></span>Creating...</span>
            </button>
          </div>
        </div>

        <div id="regSuccess" class="auth-success" style="display:none;">
          <div class="success-icon"><i class="bi bi-check-circle-fill"></i></div>
          <h2>Welcome to Lace Luxe</h2>
          <p>Check your inbox for your account confirmation.</p>
          <a href="index.html" class="btn-primary-custom auth-submit">Go to Homepage <i class="bi bi-arrow-right-short"></i></a>
        </div>
      </form>

      <div class="auth-switch" id="loginSwitch">Already have an account? <a href="login.html">Sign in</a></div>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
