<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Reset your Lace Luxe Bridal account password." />
  <title>Forgot Password | Lace Luxe Bridal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body class="auth-page auth-simple-page">
  <main class="auth-center-shell">
    <a href="index.html" class="auth-brand" aria-label="Lace Luxe Bridal home">
      <span class="brand-icon"><i class="bi bi-flower1"></i></span>
      <span class="brand-text">Lace <em>Luxe</em> Bridal</span>
    </a>

    <section class="auth-form-wrap auth-form-card" aria-labelledby="forgotTitle">
      <h1 class="auth-title" id="forgotTitle">Reset Your <em>Password</em></h1>
      <p class="auth-subtitle">Enter your email and we will send password reset instructions.</p>

      <form id="forgotPasswordForm" novalidate>
        <div class="form-group">
          <label for="forgotEmail">Email Address</label>
          <input type="email" class="form-control-custom" id="forgotEmail" placeholder="your@email.com" autocomplete="email" required />
        </div>

        <button type="submit" class="btn-primary-custom auth-submit" id="forgotPasswordBtn">
          Send Reset Link <i class="bi bi-arrow-right-short"></i>
        </button>
      </form>

      <div class="auth-switch"><a href="login.html">Back to sign in</a></div>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
