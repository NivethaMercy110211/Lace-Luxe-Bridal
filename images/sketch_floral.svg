<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#faf6f0"/>
  <!-- Grid lines to resemble drafting/sketch paper -->
  <g stroke="#e5dfd5" stroke-width="0.5">
    <line x1="0" y1="55" x2="300" y2="55"/>
    <line x1="0" y1="110" x2="300" y2="110"/>
    <line x1="0" y1="165" x2="300" y2="165"/>
    <line x1="75" y1="0" x2="75" y2="220"/>
    <line x1="150" y1="0" x2="150" y2="220"/>
    <line x1="225" y1="0" x2="225" y2="220"/>
  </g>
  <!-- Pencil Sketch: Flowers and scatter points -->
  <g fill="none" stroke="#685c53" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.75">
    <!-- Rose 1 (Center Left) -->
    <path d="M90 100 C95 85, 120 85, 125 100 C130 115, 105 125, 90 120 C75 115, 85 90, 90 100 Z"/>
    <path d="M95 105 C100 95, 115 95, 118 105 C120 112, 108 118, 98 115 C90 112, 92 102, 95 105 Z"/>
    <path d="M102 108 C105 102, 112 102, 114 108 C115 111, 108 114, 102 112 Z"/>
    <!-- Petals -->
    <path d="M78 95 C82 80, 102 78, 108 85"/>
    <path d="M118 85 C132 88, 138 108, 132 118"/>
    <path d="M125 118 C118 132, 92 135, 82 122"/>
    <path d="M78 115 C65 110, 68 92, 82 88"/>
    
    <!-- Leaves -->
    <path d="M70 90 C50 78, 55 60, 68 72 C80 85, 75 88, 70 90 Z"/>
    <line x1="70" y1="90" x2="58" y2="70"/>
    <path d="M128 110 C145 105, 155 120, 142 132 C130 142, 128 135, 128 110 Z"/>
    <line x1="128" y1="110" x2="138" y2="128"/>
    
    <!-- Stem and small buds -->
    <path d="M105 128 C100 150, 80 170, 75 180"/>
    <path d="M80 155 C70 150, 65 140, 68 135 C72 130, 80 145, 80 155 Z"/>
    
    <!-- Crystal Scatter dots (marked with crosshairs for placement) -->
    <!-- Crystal 1 -->
    <path d="M50 50 L60 50 M55 45 L55 55" stroke-width="0.8"/>
    <circle cx="55" cy="50" r="1.5" fill="#685c53"/>
    <circle cx="55" cy="50" r="4" stroke-dasharray="2 2" stroke-width="0.5"/>
    
    <!-- Crystal 2 -->
    <path d="M220 60 L230 60 M225 55 L225 65" stroke-width="0.8"/>
    <circle cx="225" cy="60" r="1.5" fill="#685c53"/>
    <circle cx="225" cy="60" r="4" stroke-dasharray="2 2" stroke-width="0.5"/>
    
    <!-- Crystal 3 -->
    <path d="M180 140 L190 140 M185 135 L185 145" stroke-width="0.8"/>
    <circle cx="185" cy="140" r="1.5" fill="#685c53"/>
    <circle cx="185" cy="140" r="4" stroke-dasharray="2 2" stroke-width="0.5"/>
    
    <!-- Crystal 4 -->
    <path d="M230 160 L240 160 M235 155 L235 165" stroke-width="0.8"/>
    <circle cx="235" cy="160" r="1.5" fill="#685c53"/>
    <circle cx="235" cy="160" r="4" stroke-dasharray="2 2" stroke-width="0.5"/>
  </g>
  <!-- Notes and sketch labels -->
  <text x="15" y="25" font-family="'Jost', sans-serif" font-size="9" fill="#8c7e73" letter-spacing="1">DESIGN SKETCH #412</text>
  <text x="15" y="38" font-family="'Jost', sans-serif" font-size="8" fill="#a89a8e">FLORAL / CRYSTAL SCATTER LAYOUT</text>
  <text x="210" y="200" font-family="'Cormorant Garamond', serif" font-size="9" font-style="italic" fill="#8c7e73">Tulle alignment grid</text>
</svg>
