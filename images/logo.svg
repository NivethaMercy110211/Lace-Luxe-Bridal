<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Premium luxury gold gradient -->
    <linearGradient id="luxuryGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5a8" />
      <stop offset="50%" stop-color="#c8a96e" />
      <stop offset="100%" stop-color="#a88548" />
    </linearGradient>
  </defs>

  <!-- Outer delicate circle representing lace thread edge -->
  <circle cx="50" cy="50" r="45" stroke="url(#luxuryGold)" stroke-width="1.2" fill="none" opacity="0.9" />

  <!-- Inner pearl/beading details ring -->
  <circle cx="50" cy="50" r="40" stroke="url(#luxuryGold)" stroke-width="1.5" stroke-dasharray="1 3" fill="none" opacity="0.6" />

  <!-- Central serif Monogram 'L' & botanical details -->
  <!-- Classic elegant Serif 'L' -->
  <path d="M40 30 H50 V33 H47 V63 C47 65.5 49.5 66.5 52.5 66.5 H59 C63 66.5 65 63.5 66 60.5 H67.5 L65.5 68.5 H37 V65.5 H40.5 C42.5 65.5 43.5 64.5 43.5 62.5 V36 C43.5 34 42.5 33 40.5 33 H40 Z" fill="url(#luxuryGold)" />

  <!-- Organic botanical vine wrapping around the L -->
  <path d="M 33 68 C 32 53, 44 48, 46 45 C 48 42, 43 38, 46 32 C 49 26, 59 26, 63 23" fill="none" stroke="url(#luxuryGold)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Elegant botanical leaves growing from the vine -->
  <!-- Leaf 1 bottom-left -->
  <path d="M33 60 C31 57, 29 58, 28 61 C28 64, 31 63, 33 60 Z" fill="url(#luxuryGold)" opacity="0.95" />
  <!-- Leaf 2 middle-left -->
  <path d="M39 51 C38 47, 35 46, 34 49 C34 52, 37 53, 39 51 Z" fill="url(#luxuryGold)" opacity="0.95" />
  <!-- Leaf 3 center-right -->
  <path d="M49 43 C51 40, 54 40, 53 43 C52 46, 50 45, 49 43 Z" fill="url(#luxuryGold)" opacity="0.95" />
  <!-- Leaf 4 top-right -->
  <path d="M57 29 C59 26, 62 27, 61 30 C60 33, 58 32, 57 29 Z" fill="url(#luxuryGold)" opacity="0.95" />
  <!-- Leaf 5 tip -->
  <path d="M63 23 C65 20, 68 21, 67 24 C66 27, 64 26, 63 23 Z" fill="url(#luxuryGold)" opacity="0.95" />

  <!-- Delicate luxury sparkles (4-point stars) -->
  <!-- Sparkle 1 (top-left) -->
  <path d="M 28 30 L 29 33 L 32 34 L 29 35 L 28 38 L 27 35 L 24 34 L 27 33 Z" fill="url(#luxuryGold)" opacity="0.9" />
  <!-- Sparkle 2 (bottom-right) -->
  <path d="M 72 56 L 73 59 L 76 60 L 73 61 L 72 64 L 71 61 L 68 60 L 71 59 Z" fill="url(#luxuryGold)" opacity="0.9" />
</svg>
