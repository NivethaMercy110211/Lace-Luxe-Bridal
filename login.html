<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to your Lace Luxe Bridal account." />
  <title>Login | Lace Luxe Bridal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body class="auth-page auth-simple-page">
  <main class="auth-center-shell">
    <a href="index.html" class="auth-brand" aria-label="Lace Luxe Bridal home">
      <span class="brand-icon"><i class="bi bi-flower1"></i></span>
      <span class="brand-text">Lace <em>Luxe</em> Bridal</span>
    </a>

    <section class="auth-form-wrap auth-form-card" aria-labelledby="loginTitle">
      <h1 class="auth-title" id="loginTitle">Welcome <em>Back</em></h1>
      <p class="auth-subtitle">Sign in to continue to your Lace Luxe account.</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" class="form-control-custom" id="loginEmail" placeholder="your@email.com" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="password-wrap">
            <input type="password" class="form-control-custom" id="loginPassword" placeholder="Your password" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password"><i class="bi bi-eye" id="pwIcon"></i></button>
          </div>
        </div>

        <div class="auth-form-row">
          <label class="form-check-label auth-check">
            <input type="checkbox" id="rememberMe" />
            <span>Remember me</span>
          </label>
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary-custom auth-submit" id="loginBtn">
          <span id="loginBtnText">Sign In <i class="bi bi-arrow-right-short"></i></span>
          <span id="loginBtnLoading" class="d-none"><span class="spinner-border spinner-border-sm me-2"></span>Signing in...</span>
        </button>
      </form>

      <div class="auth-switch">Don't have an account? <a href="register.html">Create one</a></div>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
